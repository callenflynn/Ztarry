name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Optional release version override"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 with MinGW toolchain
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-pdcurses
            mingw-w64-x86_64-ninja
          msystem: MINGW64

      - name: Build Ztarry
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Resolve release version
        id: version
        shell: pwsh
        env:
          VERSION_INPUT: ${{ github.event.inputs.version }}
        run: |
          if ($env:GITHUB_REF_TYPE -eq 'tag' -and $env:GITHUB_REF_NAME.StartsWith('v')) {
            $version = $env:GITHUB_REF_NAME.Substring(1)
          }
          elseif ($env:VERSION_INPUT -and $env:VERSION_INPUT.Trim().Length -gt 0) {
            $version = $env:VERSION_INPUT.Trim()
          }
          else {
            $version = "0.1.0.$env:GITHUB_RUN_NUMBER"
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Prepare release archive
        id: package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path out -Force | Out-Null
          Copy-Item build/Ztarry.exe out/Ztarry.exe
          Copy-Item README.md out/README.md
          Compress-Archive -Path out/* -DestinationPath Ztarry-windows-x64.zip -Force
          $hash = (Get-FileHash Ztarry-windows-x64.zip -Algorithm SHA256).Hash.ToLower()
          "sha256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ztarry-windows-x64
          path: Ztarry-windows-x64.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ github.ref_type != 'tag' }}
          draft: false
          files: |
            Ztarry-windows-x64.zip
          body: |
            Automated release for v${{ steps.version.outputs.version }}.

            Source ref: ${{ github.ref_name }}

            SHA256 (Ztarry-windows-x64.zip):
            ${{ steps.package.outputs.sha256 }}
